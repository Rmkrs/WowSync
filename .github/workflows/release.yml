name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WowSync.slnx

      - name: Publish
        run: >
          dotnet publish Source/WowSync.App/WowSync.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output artifacts/WowSync-win-x64

      - name: Remove debug/documentation files
        shell: pwsh
        run: |
          Remove-Item artifacts/WowSync-win-x64/*.pdb -Force -ErrorAction SilentlyContinue
          Remove-Item artifacts/WowSync-win-x64/*.xml -Force -ErrorAction SilentlyContinue
          
      - name: Zip artifact
        shell: pwsh
        run: |
          Compress-Archive `
            -Path artifacts/WowSync-win-x64/* `
            -DestinationPath artifacts/WowSync-win-x64.zip `
            -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/WowSync-win-x64.zip
          generate_release_notes: true